{% extends 'base.html' %}

{% block content %}
  <div class="d-flex justify-content-between align-items-center mb-3">
    <h1 class="h3 mb-0">Dashboard</h1>
    <a class="btn btn-outline-secondary" href="{% url 'crm:client_list' %}">Ver clientes</a>
  </div>

  <div class="row g-3 mb-3">
    {% for item in status_cards %}
      <div class="col-md-3">
        <div class="card">
          <div class="card-body">
            <div class="text-muted small">{{ item.label }}</div>
            <div class="display-6">{{ item.count }}</div>
          </div>
        </div>
      </div>
    {% endfor %}
  </div>

  <div class="card">
    <div class="card-body">
      <div class="text-muted">Valor potencial total</div>
      <div class="display-6">{{ total_potential }}</div>
    </div>
  </div>

  <div class="card mt-3">
    <div class="card-body">
      <h2 class="h5">Clientes por status</h2>
      <canvas id="statusChart" height="110"></canvas>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script>
    const labels = JSON.parse('{{ chart_labels_json|escapejs }}');
    const data = JSON.parse('{{ chart_counts_json|escapejs }}');

    const ctx = document.getElementById('statusChart');
    new Chart(ctx, {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: 'Clientes',
          data: data,
          backgroundColor: ['#0d6efd', '#ffc107', '#198754', '#dc3545'],
        }]
      },
      options: {
        responsive: true,
        plugins: {
          legend: { display: false }
        },
        scales: {
          y: { beginAtZero: true, ticks: { precision: 0 } }
        }
      }
    });
  </script>
{% endblock %}
