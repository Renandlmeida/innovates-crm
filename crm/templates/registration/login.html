<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Innovates CRM - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      :root {
        --ic-primary: #7c3aed;
        --ic-secondary: #06b6d4;
        --ic-dark: #0b1020;
      }
      body {
        min-height: 100vh;
        background:
          radial-gradient(1200px 600px at 10% 10%, rgba(124, 58, 237, 0.35), transparent 60%),
          radial-gradient(900px 500px at 90% 20%, rgba(6, 182, 212, 0.30), transparent 60%),
          radial-gradient(700px 450px at 20% 90%, rgba(16, 185, 129, 0.18), transparent 60%),
          linear-gradient(180deg, #070a16, #0b1020 55%, #0a0f1f);
      }
      .ic-shell {
        position: relative;
      }
      .ic-orb {
        position: absolute;
        border-radius: 999px;
        filter: blur(20px);
        opacity: 0.7;
        pointer-events: none;
      }
      .ic-orb.orb-1 {
        width: 140px;
        height: 140px;
        left: -30px;
        top: -35px;
        background: radial-gradient(circle at 30% 30%, rgba(124, 58, 237, 0.95), rgba(124, 58, 237, 0.00));
      }
      .ic-orb.orb-2 {
        width: 180px;
        height: 180px;
        right: -55px;
        bottom: -60px;
        background: radial-gradient(circle at 30% 30%, rgba(6, 182, 212, 0.90), rgba(6, 182, 212, 0.00));
      }
      .ic-card {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.14);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
        color: rgba(255, 255, 255, 0.92);
      }
      .ic-muted {
        color: rgba(255, 255, 255, 0.70) !important;
      }
      .ic-title {
        letter-spacing: 0.2px;
      }
      .ic-badge {
        width: 64px;
        height: 64px;
        border-radius: 18px;
        background: linear-gradient(135deg, var(--ic-primary), var(--ic-secondary));
        box-shadow: 0 18px 35px rgba(124, 58, 237, 0.35);
      }
      .ic-btn {
        background: linear-gradient(135deg, var(--ic-primary), #4f46e5);
        border: none;
        box-shadow: 0 16px 28px rgba(124, 58, 237, 0.35);
      }
      .ic-btn:hover {
        filter: brightness(1.05);
      }
      .form-control {
        background: rgba(255, 255, 255, 0.10);
        border: 1px solid rgba(255, 255, 255, 0.18);
        color: rgba(255, 255, 255, 0.92);
      }
      .form-control:focus {
        background: rgba(255, 255, 255, 0.12);
        border-color: rgba(124, 58, 237, 0.8);
        box-shadow: 0 0 0 .25rem rgba(124, 58, 237, 0.25);
        color: rgba(255, 255, 255, 0.92);
      }
      .form-label {
        color: rgba(255, 255, 255, 0.86);
      }
    </style>
  </head>
  <body>
    <main class="container py-5" style="max-width: 440px;">
      <div class="text-center mb-4">
        <div class="d-inline-flex align-items-center justify-content-center ic-badge text-white">
          <span class="fw-bold">IC</span>
        </div>
        <div class="h4 mt-3 mb-1 text-white ic-title">Innovates CRM</div>
        <div class="ic-muted">Acesse sua conta para continuar</div>
      </div>

      <div class="ic-shell">
        <div class="ic-orb orb-1"></div>
        <div class="ic-orb orb-2"></div>

        <div class="card shadow border-0 ic-card">
          <div class="card-body p-4">
            <h1 class="h5 mb-1 text-white">Login</h1>
            <div class="ic-muted mb-3">Entre com suas credenciais</div>

            {% if form.errors %}
              <div class="alert alert-danger">Usuário ou senha inválidos.</div>
            {% endif %}

            <form method="post" action="{% url 'login' %}">
              {% csrf_token %}

              <div class="mb-3">
                <label class="form-label">Usuário</label>
                <input type="text" name="username" autofocus class="form-control" required>
              </div>
              <div class="mb-3">
                <label class="form-label">Senha</label>
                <input type="password" name="password" class="form-control" required>
              </div>

              <input type="hidden" name="next" value="{{ next }}">

              <button class="btn btn-primary w-100 ic-btn" type="submit">Entrar</button>
            </form>
          </div>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
