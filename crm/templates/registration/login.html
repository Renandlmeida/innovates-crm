<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Innovates CRM - Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  </head>
  <body class="bg-light">
    <main class="container py-5" style="max-width: 440px;">
      <div class="text-center mb-4">
        <div class="d-inline-flex align-items-center justify-content-center rounded-4 text-white" style="width: 56px; height: 56px; background: linear-gradient(135deg, #0b1f4d, #0d6efd);">
          <span class="fw-bold">IC</span>
        </div>
        <div class="h4 mt-3 mb-1">Innovates CRM</div>
        <div class="text-muted">Acesse sua conta para continuar</div>
      </div>

      <div class="card shadow border-0">
        <div class="card-body">
          <h1 class="h5 mb-3">Login</h1>

          {% if form.errors %}
            <div class="alert alert-danger">Usuário ou senha inválidos.</div>
          {% endif %}

          <form method="post" action="{% url 'login' %}">
            {% csrf_token %}

            <div class="mb-3">
              <label class="form-label">Usuário</label>
              <input type="text" name="username" autofocus class="form-control" required>
            </div>
            <div class="mb-3">
              <label class="form-label">Senha</label>
              <input type="password" name="password" class="form-control" required>
            </div>

            <input type="hidden" name="next" value="{{ next }}">

            <button class="btn btn-primary w-100" type="submit">Login</button>
          </form>
        </div>
      </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </body>
</html>
